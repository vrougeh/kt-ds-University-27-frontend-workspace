<!-- 
    현재 HTML 문서가 HTML5 표준으로 생성됨을 알려줌
    아래 문서 타입이 정의되지 않았다면 html4표준을 사용하는 것으로 판단
-->
<!doctype html>
<!--
HTML을 작성하는 시점 : Tag
화면에 보여지는 시점 : Element
DOM Tree 기준 : Nodex

HTML 태그의 역할?
    Window의 생성하는 역할
        Window의 이름을 지정
        Window의 아이콘(Favicon)을 지정
        Window의 내용을 작성
-->
<html>
  <!-- Window의 Tab과 관련된 정보를 작성-->
  <head>
    <!-- Window Tab의 이름-->
    <title>HTML 생성합니다.</title>
    <link rel="shortcut icon" href="https://naver.com/favicon.ico?1" />
    <meta name="charset" content="UTF-8" />
  </head>
  <body>
    html 브라우저 본문내용
  </body>
</html>
