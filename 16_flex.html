<!doctype html>
<html>

    <title>Flex Container</title>
    <link rel="stylesheet" type="text/css" href="./16_flex.css" />
  </head>
  <body>
    <div class="no-flex">
      <div>A</div>
      <div>B</div>
      <div>C</div>
    </div>

    <ul class="no-flex">
      <li>A</li>
      <li>B</li>
      <li>C</li>
    </ul>
    <div class="flex">
      <div>A</div>
      <div>B</div>
      <div>C</div>
      <div>A</div>
      <div>B</div>
      <div>C</div>
      <div>A</div>
      <div>B</div>
      <div>C</div>
      <div>A</div>
      <div>B</div>
      <div>C</div>
      <div>A</div>
      <div>B</div>
      <div>C</div>
      <div>A</div>
      <div>B</div>
      <div>C</div>
    </div>

    <ul class="flex">
      <li>A</li>
      <li>B</li>
      <li>C</li>
    </ul>
  </body>
</html>
