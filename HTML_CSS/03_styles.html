<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style type="text/css">
        div {
            color: red;
            font-size: 12px;
        }

        p {
            font-size: 24px;
            font-weight: 300;
        }

        span {
            background-color: rgba(168, 168, 58, 0.747);
            color: red;
            font-weight: 900;
            text-decoration: underline;
        }

        h1 {
            color: purple;
        }

        h2 {
            color: purple;
        }

        h3,h4,h5,h6 {
            color: cyan;
        }


    </style>
</head>
<body>
    <div>영역나누기 1</div>
    <div>영역나누기 2</div>
    
    <p>단락 나누기 1</p>
    <p>단락 나누기 2</p>

    <span>단어 강조 1</span>
    <span>단어 강조 2</span>

    <h1>큰 글자</h1>
    <h2>조금 큰 글자</h2>
    <h3>보통크기 글자</h3>
    <h4>조금 작은 글자</h4>
    <h5>더 작은 글자</h5>
    <h6>매우 작은 글자</h6>
</body>
</html>
