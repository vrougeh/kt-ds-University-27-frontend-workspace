<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <input title="아이디를 입력해야합니다" tabindex="1" />
    <p tabindex="2">단락을만들어주는 p 태그</p>
    <!-- Unordered List-->
    <ul tabindex="3">
      <!--Lite item-->
      <li tabindex="4" accesskey="r">첫번째 아이템</li>
      <li tabindex="5">두번째 아이템</li>
      <li tabindex="6">세번째 아이템</li>
    </ul>
    <div>
      <p tabindex="7">두번째 단락</p>
      <p tabindex="8">세번째 단락</p>
    </div>
  </body>
</html>
