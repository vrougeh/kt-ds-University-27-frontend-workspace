<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Naver Form</title>
    <link rel="stylesheet" type="text/css" href="./18_naver_form.css" />
  </head>
  <body>
    <div class="form">
      <div class="basic-info">
        <label for="user-id">i</label>
        <input type="text" id="user-id" placeholder="아이디" />
        <span>@naver.com</span>
        <label for="user-pwd">ㅁ</label>
        <input type="password" id="user-pwd" placeholder="비밀번호" />
        <span>ㅇ</span>
        <label for="user-email">@</label>
        <input
          type="email"
          id="user-email"
          placeholder="[선택] 이메일주소 (비밀번호 찾기 등 본인 확인용)"
        />
      </div>
      <div class="personal-info">
        <label for="user-name">&</label>
        <input type="text" id="user-name" placeholder="이름" />
        <label for="user-birthday">ㅁ</label>
        <input type="date" id="user-birthday" placeholder="생년월일 8자리" />
        <label for="user-call-company">A</label>
        <select name="" id="user-call-company">
          <option value="">통신사 선택</option>
          <option value="">KT</option>
          <option value="">SKT</option>
          <option value="">U+</option>
          <option value="">알뜰폰</option>
        </select>
        <span></span>
        <div class="celect-info">
          <div class="checkbox">
            <input type="radio" name="gender" id="male" />
            <label for="male">남자</label>
            <input type="radio" name="gender" id="female" />
            <label for="female">여자</label>
          </div>
          <div class="checkbox">
            <input type="radio" name="world" id="ko" />
            <label for="ko">내국인</label>
            <input type="radio" name="world" id="wo" />
            <label for="wo">외국인</label>
          </div>
        </div>
      </div>
      <div class="tel-info">
        <label for="user-phonenumber"> ㅁ</label>
        <input
          type="tel"
          id="user-phonenumber"
          placeholder="휴대전화 번호"
          pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}"
        />
      </div>
      <div class="agreement-info">
        <input type="checkbox" name="" id="" />
        <label for=""> <span>[필수]</span>인증 약관 전체 동의 </label>
      </div>
      <div class="send">인증 요청</div>
    </div>
  </body>
</html>
